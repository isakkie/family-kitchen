<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fbfaf7" />
    <title>家庭厨房</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="auth-locked">
    <section class="auth-screen" id="authScreen" aria-label="家庭访问密码">
      <form class="auth-card" id="authForm">
        <div class="brand auth-brand">
          <div class="brand-mark">厨</div>
          <div>
            <h1>家庭厨房</h1>
            <p>输入家庭密码</p>
          </div>
        </div>
        <label>
          家庭密码
          <input id="authPassword" type="password" autocomplete="current-password" placeholder="输入后进入" />
        </label>
        <p class="field-hint" id="authMessage">只给家人使用的入口。</p>
        <button class="primary-btn" type="submit">进入</button>
      </form>
    </section>

    <div class="app-shell">
      <aside class="sidebar" aria-label="主导航">
        <div class="brand">
          <div class="brand-mark">厨</div>
          <div>
            <h1>家庭厨房</h1>
            <p>菜谱、库存、菜单</p>
          </div>
        </div>
        <nav class="nav-tabs" id="navTabs">
          <button class="nav-tab active" data-view="recipes" type="button">菜谱</button>
          <button class="nav-tab" data-view="import" type="button">导入</button>
          <button class="nav-tab" data-view="pantry" type="button">冰箱</button>
          <button class="nav-tab" data-view="shopping" type="button">采购</button>
          <button class="nav-tab" data-view="planner" type="button">菜单</button>
        </nav>
      </aside>

      <main class="main">
        <section class="toolbar">
          <div class="searchbar">
            <span>⌕</span>
            <input id="globalSearch" type="search" placeholder="搜索菜名、食材、标签" />
          </div>
          <div class="button-row">
            <button class="ghost-btn" id="lockAppBtn" type="button">锁定</button>
            <button class="primary-btn" id="quickAddBtn" type="button">＋ 新菜谱</button>
          </div>
        </section>

        <section class="view active" id="recipesView" aria-label="菜谱">
          <div class="section-head">
            <div>
              <h2>菜谱库</h2>
              <p id="recipeCount">0 道菜</p>
            </div>
            <div class="filter-row" id="tagFilters"></div>
          </div>
          <div class="recipe-grid" id="recipeGrid"></div>
        </section>

        <section class="view" id="importView" aria-label="导入">
          <div class="workspace-grid import-layout">
            <form class="panel" id="importForm">
              <div class="panel-head">
                <h2>导入菜谱</h2>
                <span class="muted">链接或正文</span>
              </div>
              <label>
                来源链接
                <input id="sourceUrl" type="url" placeholder="https://www.xiachufang.com/recipe/..." />
              </label>
              <label>
                菜谱正文
                <textarea id="rawText" rows="14" placeholder="粘贴标题、用料、步骤、小贴士"></textarea>
              </label>
              <div class="button-row">
                <button class="primary-btn" type="submit">识别并编辑</button>
                <button class="ghost-btn" id="loadSampleBtn" type="button">放入示例</button>
              </div>
            </form>

            <form class="panel editor-panel" id="recipeForm">
              <div class="panel-head">
                <h2 id="editorTitle">编辑菜谱</h2>
                <span class="muted" id="editingStatus">未选择</span>
              </div>
              <input type="hidden" id="recipeId" />
              <label>
                标题
                <input id="titleInput" required placeholder="番茄炒蛋" />
              </label>
              <label>
                来源
                <input id="recipeSourceInput" placeholder="原链接或出处" />
              </label>
              <label>
                用料
                <textarea id="ingredientsInput" rows="7" placeholder="番茄 2个&#10;鸡蛋 3个&#10;盐 少许"></textarea>
              </label>
              <label>
                步骤
                <textarea id="stepsInput" rows="9" placeholder="1. 处理食材&#10;2. 下锅翻炒"></textarea>
              </label>
              <label>
                小贴士
                <textarea id="tipsInput" rows="4" placeholder="家里口味偏淡可少放盐"></textarea>
              </label>
              <label>
                标签
                <input id="tagsInput" placeholder="快手菜, 晚餐, 少油" />
              </label>
              <label>
                家庭备注
                <textarea id="notesInput" rows="3" placeholder="下次少糖、加一点醋"></textarea>
              </label>
              <div class="button-row">
                <button class="primary-btn" type="submit">保存</button>
                <button class="ghost-btn danger" id="deleteRecipeBtn" type="button">删除</button>
              </div>
            </form>

            <section class="panel batch-panel" aria-label="批量导入">
              <div class="panel-head">
                <h2>批量导入</h2>
                <span class="muted" id="batchStatus">等待导入</span>
              </div>
              <label>
                批量内容
                <textarea id="batchInput" rows="8" placeholder="粘贴 JSON、多个菜谱正文，或一行一个下厨房链接"></textarea>
              </label>
              <label>
                JSON 文件
                <input id="batchFileInput" type="file" accept="application/json,.json" />
              </label>
              <p class="field-hint">选择文件后会自动导入；如果没有反应，可以再点一次批量入库。</p>
              <div class="button-row">
                <button class="primary-btn" id="batchImportBtn" type="button">批量入库</button>
                <button class="ghost-btn" id="exportDataBtn" type="button">导出备份</button>
              </div>
            </section>
          </div>
        </section>

        <section class="view" id="pantryView" aria-label="冰箱">
          <div class="workspace-grid">
            <form class="panel" id="pantryForm">
              <div class="panel-head">
                <h2>现有食材</h2>
                <span class="muted">冰箱和常备</span>
              </div>
              <label>
                食材
                <input id="pantryName" required placeholder="豆腐" />
              </label>
              <label>
                数量
                <input id="pantryAmount" placeholder="1盒" />
              </label>
              <label>
                保鲜天数
                <input id="pantryExpireDays" inputmode="numeric" value="3" placeholder="例如 3 或 3天" />
              </label>
              <p class="field-hint" id="pantryExpirePreview">预计到期：3天后</p>
              <button class="primary-btn" type="submit">加入冰箱</button>
              <div class="chips" id="pantryChips"></div>
            </form>

            <div class="panel">
              <div class="panel-head">
                <h2>推荐你做</h2>
                <select id="recommendSort" aria-label="推荐排序">
                  <option value="match">匹配度最高</option>
                  <option value="missing">补买最少</option>
                  <option value="expiry">快过期优先</option>
                </select>
              </div>
              <div class="recommend-list" id="recommendList"></div>
            </div>
          </div>
        </section>

        <section class="view" id="shoppingView" aria-label="采购">
          <div class="panel wide-panel">
            <div class="panel-head">
              <h2>购物清单</h2>
              <button class="ghost-btn" id="clearShoppingBtn" type="button">清空</button>
            </div>
            <div class="shopping-list" id="shoppingList"></div>
          </div>
        </section>

        <section class="view" id="plannerView" aria-label="菜单">
          <div class="panel wide-panel">
            <div class="panel-head">
              <h2>一周菜单</h2>
              <button class="ghost-btn" id="clearPlanBtn" type="button">清空</button>
            </div>
            <div class="week-grid" id="weekGrid"></div>
          </div>
        </section>
      </main>
    </div>

    <dialog id="recipeDialog">
      <article id="recipeDetail"></article>
      <form method="dialog" class="dialog-actions">
        <button class="ghost-btn" value="close">关闭</button>
      </form>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
